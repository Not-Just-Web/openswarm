<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenSwarm Command Center</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero panel">
        <p class="eyebrow">OpenSwarm</p>
        <h1>Command Center</h1>
        <p class="lede">Shell agents, Redis coordination, Docker telemetry, and a persistent Obsidian memory vault in one workspace.</p>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Steering</h2>
          <form id="command-form">
            <label>
              Target Agent
              <select id="target">
                <option value="coder_agent">coder_agent</option>
                <option value="tester_agent">tester_agent</option>
                <option value="pm_agent">pm_agent</option>
                <option value="techlead_agent">techlead_agent</option>
                <option value="designer_agent">designer_agent</option>
              </select>
            </label>
            <label>
              Command
              <textarea id="command" rows="5" placeholder="Tell the swarm what to do"></textarea>
            </label>
            <button type="submit">Send Instruction</button>
          </form>
          <p id="command-status" class="status"></p>
        </article>

        <article class="panel">
          <h2>Docker</h2>
          <div id="docker-meta" class="meta"></div>
          <div id="containers" class="stack"></div>
        </article>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Heartbeats</h2>
          <div id="heartbeats" class="stack"></div>
        </article>

        <article class="panel terminal-panel">
          <h2>Live Logs</h2>
          <pre id="logs" class="terminal"></pre>
        </article>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
