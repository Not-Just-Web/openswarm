services:
  redis:
    image: redis:7-alpine
    container_name: openswarm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - swarm-net

  ollama:
    image: ollama/ollama
    container_name: openswarm-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - swarm-net

  # Next.js dashboard (hot reload in dev)
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      target: dev                        # switch to 'production' for prod
    container_name: openswarm-dashboard
    ports:
      - "${DASHBOARD_PORT:-8277}:8277"   # always serves on 8277
    environment:
      OPENSWARM_ROOT: /app
      OPENSWARM_WORKSPACE: /workspace/projects
      REDIS_HOST: redis
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    volumes:
      # Mount the whole app so Next can see tailwind/postcss config too.
      # Keep node_modules inside the container for performance.
      - ./dashboard:/app/dashboard
      - dashboard-node-modules:/app/dashboard/node_modules
      - ./runtime:/app/runtime
      - ./shared:/app/shared
      - openswarm-workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - swarm-net

  supervisor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openswarm-supervisor
    environment:
      OPENSWARM_ROOT: /app
      OPENSWARM_WORKSPACE: /workspace/projects
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_HOST: ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-kimi}
      HEARTBEAT_INTERVAL: 15
    volumes:
      - ./:/app
      - openswarm-workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["/app/scripts/entrypoint.sh"]
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    restart: always
    networks:
      - swarm-net

volumes:
  ollama-data:
  openswarm-workspace:
  dashboard-node-modules:
    name: openswarm-dashboard-node-modules

networks:
  swarm-net:
    driver: bridge
